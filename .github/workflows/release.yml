name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: edit-linux-x86_64
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            archive: edit-linux-aarch64
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: macos-26
            target: x86_64-apple-darwin
            archive: edit-macos-x86_64
          - os: macos-26
            target: aarch64-apple-darwin
            archive: edit-macos-aarch64
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: rustup target add ${{ matrix.target }}
      - if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - run: cargo build --release --verbose --bin edit --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
      - run: |
          name="${{ matrix.archive }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/edit" README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: edit-*.tar.gz

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
