name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: cargo build --release --verbose
      - run: |
          name="edit-${RUNNER_OS}-${RUNNER_ARCH}"
          mkdir "$name"
          cp target/release/edit README.md LICENSE "$name/"
          cp target/release/deps/libedit.* "$name/" 2>/dev/null || true
          tar -czf "$name.tar.gz" "$name"
      - uses: actions/upload-artifact@v4
        with:
          name: edit-${{ runner.os }}-${{ runner.arch }}
          path: edit-*.tar.gz

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
